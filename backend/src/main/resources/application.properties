# Información de la aplicación
spring.application.name=bloodandblade-service

# Configuración del servidor
server.port=8080

# Configuración de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:8266/bloodblade
spring.datasource.username=dazzblade
spring.datasource.password=K1ll&Sw1ng
spring.datasource.driver-class-name=org.postgresql.Driver

# Inicialización SQL
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Configuración del juego
game.room.max-players=64
game.room.tick-rate-hz=20
game.room.world-width=80.0
game.room.world-depth=80.0
game.room.move-speed=6.0
game.room.player-height=1.8
game.room.player-radius=0.35
game.room.max-health=100

# Alcance del hit (servidor): radio aproximado en el que cuenta un RELEASE; sube/baja si el tajo visual encaja antes/después
game.room.hit-reach=2.0

# Timing de combate
# windupMs: el jugador CARGA el swing (visible para el rival, da tiempo a bloquear)
# con delay de red ~120ms, el rival ve el windup ~170ms después → queda ~480ms para reaccionar
game.room.windup-ms=650
# releaseMs: ventana del golpe (rápido pero visible)
game.room.release-ms=300
# recoveryMs: penalización por fallar o quedar expuesto
game.room.recovery-ms=600
# blockedMs: freeze cuando el golpe es bloqueado
game.room.blocked-ms=350

# Logs de combate (DEBUG para ver hits, kills y decisiones de los bots en consola)
logging.level.com.bloodblade.game.NpcBot=DEBUG
logging.level.com.bloodblade.game.GameRoom=DEBUG
